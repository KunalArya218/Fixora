services:
  - type: web
    name: fixora
    env: python
    plan: free

    buildCommand: "pip install -r requirements.txt"

    startCommand: "python app.py"

    envVars:
      - key: SECRET_KEY
        sync: false

      - key: DB_USER
        sync: false

      - key: DB_PASSWORD
        sync: false

      - key: DB_HOST
        sync: false

      - key: DB_PORT
        sync: false

      - key: DB_NAME
        sync: false

      - key: MAIL_SERVER
        sync: false

      - key: MAIL_PORT
        sync: false

      - key: MAIL_USE_TLS
        sync: false

      - key: MAIL_USERNAME
        sync: false

      - key: MAIL_PASSWORD
        sync: false

      - key: MAIL_DEFAULT_SENDER
        sync: false